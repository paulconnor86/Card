<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul's Card</title>
<style>
  @import url('https://fonts.google.com/specimen/Permanent+Marker');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #ffffff;
    --paper: #f0f0f8;
    --accent: #e63946;
    --muted: #ffffff;
    --bg: #0d0d0d;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Permanent Marker', monospace;
    text-transform: uppercase;
    color: #eee;
    padding: 2rem 1rem;
    gap: 2rem;
  }

  h1 {
    font-family: 'Permanent Marker', monospace;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
     color: #ffffff;
    text-align: center;
  }

  /* ── Image + overlay container ── */
  .scene {
    position: relative;
    width: min(700px, 95vw);
    user-select: none;
  }

  .scene img {
    width: 100%;
    display: block;
    border-radius: 6px;
  }

  /* The card in the photo sits roughly here (tweak to taste) */
  .card-overlay {
    position: absolute;
    top: 48.04%;
    left: 25.28%;
    width: 38.07%;
    height: 38.24%;

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3%;

    pointer-events: none;
    overflow: hidden;
  }

  .card-text {
    font-family: 'Caveat', cursive;
    font-size: clamp(14px, 3.5vw, 28px);
    font-weight: 600;
        text-transform: uppercase;
    color: #1a1230;
    text-align: center;
    line-height: 1.35;
    word-break: break-word;
    white-space: pre-wrap;
    width: 100%;
    max-width: 100%;
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .card-text.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: min(700px, 95vw);
  }

  label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
    display: block;
  }

  textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ffffff;
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    padding: 0.75rem 1rem;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.4;
  text-align: center;
  }

  textarea::placeholder {
    color: #444;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  .row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .font-size-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    flex: 1;
  }

  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    min-width: 80px;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }

  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hint {
    font-size: 0.68rem;
    color: #444;
    letter-spacing: 0.05em;
    text-align: center;
  }
</style>
</head>

<div class="controls">
  <div>
    <label for="textInput">Your message</label>
    <textarea id="textInput" placeholder="type something..." maxlength="120"></textarea>
  </div>

  <div class="row">
    <div class="font-size-control">
      <span>size</span>
      <input type="range" id="sizeSlider" min="60" max="160" value="100">
      <span id="sizeLabel">100%</span>
    </div>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>
</div>

<p class="hint">text renders directly onto the card in real-time</p>

<script>
  const textInput  = document.getElementById('textInput');
  const cardText   = document.getElementById('cardText');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeLabel  = document.getElementById('sizeLabel');
  const clearBtn   = document.getElementById('clearBtn');

  function update() {
    const val = textInput.value.trim();
    cardText.textContent = val;
    cardText.classList.toggle('visible', val.length > 0);
  }

  function applySize() {
    const pct = sizeSlider.value;
    sizeLabel.textContent = pct + '%';
    cardText.style.fontSize = `calc(clamp(14px, 3.5vw, 28px) * ${pct / 100})`;
  }

  textInput.addEventListener('input', update);
  sizeSlider.addEventListener('input', applySize);
  clearBtn.addEventListener('click', () => { textInput.value = ''; update(); });

  // Auto-focus
  textInput.focus();
</script>
